{% extends "base.html" %}


{% block content %}
{% load static %}

<!-- ========================= SECTION MAIN ========================= -->
<section class="section-intro padding-y-sm">
<div class="container">
	<div class="intro-banner-wrap">
		<img src="{% static 'images/banners/1.jpg' %}" class="img-fluid rounded">
	</div>
</div>
</section>
<!-- ========================= SECTION MAIN END// ========================= -->

<!-- ========================= SECTION  ========================= -->
<section class="section-name padding-y-sm">
<div class="container">

<header class="section-heading">
	<a href="./store.html" class="btn btn-outline-primary float-right">See all</a>
	<h3 class="section-title">Popular products</h3>
</header>

<div class="row">
	{% for product in products %}
		<div class="col-md-3">
		<div class="card card-product-grid">
			<a href="{{ product.get_url }}" class="img-wrap"> <img src="{{ product.images.url }}"> </a>
			<figcaption class="info-wrap">
				<a href="{{ product.get_url }}" class="title">{{ product.product_name }}</a>
				<div class="price mt-1">₹ {{ product.price }}</div>
				<div class="rating-star">
            {% with avg=product.averageReview %}

            <span>
              <i
                class="fa {% if avg < 0.5 %}fa-star-o{% elif avg < 1 %}fa-star-half-o{% else %}fa-star{% endif %}"
              ></i>
            </span>

            <span>
              <i
                class="fa {% if avg < 1.5 %}fa-star-o{% elif avg < 2 %}fa-star-half-o{% else %}fa-star{% endif %}"
              ></i>
            </span>

            <span>
              <i
                class="fa {% if avg < 2.5 %}fa-star-o{% elif avg < 3 %}fa-star-half-o{% else %}fa-star{% endif %}"
              ></i>
            </span>

            <span>
              <i
                class="fa {% if avg < 3.5 %}fa-star-o{% elif avg < 4 %}fa-star-half-o{% else %}fa-star{% endif %}"
              ></i>
            </span>

            <span>
              <i
                class="fa {% if avg < 4.5 %}fa-star-o{% elif avg < 5 %}fa-star-half-o{% else %}fa-star{% endif %}"
              ></i>
            </span>

            {% endwith %}
        </div>
			</figcaption>
		</div>
		</div>
	{% endfor %}
	
	
</div>

</div>
</section>
<!-- ========================= SECTION  END// ========================= -->


{% endblock %}
